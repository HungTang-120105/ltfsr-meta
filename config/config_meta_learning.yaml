# Meta-Learning Configuration - Prototype Head + Episodic Training

# Dataset
dataset:
  name: "CIFAR-100-LT"
  data_dir: "./data/CIFAR-100-LT"
  num_classes: 100
  train_split: 0.8
  
# Model Architecture
model:
  backbone: "resnet18"
  pretrained: true
  num_features: 512
  num_classes: 100
  prototype_dim: 256
  
# Meta-Learning
meta_learning:
  enabled: true
  episodic_training: true
  episode_size: 5  # 5-way
  support_shot: 5  # 5-shot
  query_shot: 15   # 15-query
  episodes_per_epoch: 100
  
# Prototype Learning
prototype:
  enabled: true
  distance_metric: "euclidean"
  
# Meta-Weighting
meta_weighting:
  enabled: true
  weight_net_dim: 256
  
# Training
training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 5e-4
  scheduler: "cosine"
  
# Loss
loss:
  name: "prototype_loss"
  margin: 1.0
  
# Evaluation
evaluation:
  eval_interval: 10
  save_best: true
  metrics: ["accuracy", "many_accuracy", "med_accuracy", "few_accuracy", "g_mean"]

# Device
device: "cuda"
num_workers: 8
seed: 42
