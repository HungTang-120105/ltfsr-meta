# Full Model Configuration - Prototype + Meta-Learning + SupCon + MetaSAug + Refinement

# Dataset
dataset:
  name: "CIFAR-100-LT"
  data_dir: "./data/CIFAR-100-LT"
  num_classes: 100
  train_split: 0.8
  
# Model Architecture
model:
  backbone: "resnet18"
  pretrained: true
  num_features: 512
  num_classes: 100
  embedding_dim: 256
  
# Meta-Learning
meta_learning:
  enabled: true
  episodic_training: true
  episode_size: 5
  support_shot: 5
  query_shot: 15
  episodes_per_epoch: 100
  
# Prototype Learning
prototype:
  enabled: true
  distance_metric: "euclidean"
  refinement: true  # Dynamic prototype refinement
  
# Meta-Weighting
meta_weighting:
  enabled: true
  weight_net_dim: 256
  
# Contrastive Learning (SupCon)
contrastive:
  enabled: true
  temperature: 0.07
  loss_weight: 0.5
  
# MetaSAug
meta_aug:
  enabled: true
  augmentation_strength: 0.5
  
# Training
training:
  epochs: 120
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 5e-4
  scheduler: "cosine"
  warmup_epochs: 10
  
# Loss
loss:
  name: "combined_loss"  # Prototype + SupCon + Meta-Weighting
  prototype_weight: 1.0
  contrastive_weight: 0.5
  margin: 1.0
  
# Evaluation
evaluation:
  eval_interval: 10
  save_best: true
  metrics: ["accuracy", "many_accuracy", "med_accuracy", "few_accuracy", "g_mean"]
  save_predictions: true

# Device
device: "cuda"
num_workers: 8
seed: 42
